# ── Prod Environment Configuration ────────────────────────────────────────────
#
# Replace all placeholder values (<...>) with your actual values.
#
# Deploy:
#   1. Create a PR with your changes → plan runs automatically
#   2. Review the plan in the PR comment
#   3. Merge to main → apply runs (prod environment, requires reviewer approval)

# ── State backend ────────────────────────────────────────────────────────────
terraform_backend:
  type: azurerm
  storage_account_name: <tfstate-storage-account>
  container_name: terraform
  key: <org>/prod/<region>/core-infra/terraform.tfstate
  resource_group_name: <tfstate-resource-group>

# ── Subscription ─────────────────────────────────────────────────────────────
subscription_id: "<azure-subscription-id>"

# ── Resource Groups ──────────────────────────────────────────────────────────
azure_resource_groups:
  core:
    subscription_id: "<azure-subscription-id>"
    name: rg-<org>-prod-core
    location: westeurope
    tags:
      environment: prod
      managed_by: terraform

