# ── Infrastructure Deployment ─────────────────────────────────────────────────
#
# Calls the reusable Terraform workflow from the module repository.
#
# Flow:
#   PR opened/updated → plan (per changed environment)
#   PR merged to main → apply (with environment approval gates)
#
# Environments are auto-discovered from configurations/env-*/config.yaml.
# For each environment "foo", configure:
#   - Secrets:   AZURE_CLIENT_ID_FOO, AZURE_SUBSCRIPTION_ID_FOO, AZURE_TENANT_ID
#   - Variables: AZURE_BACKEND_STORAGE_ACCOUNT_FOO, AZURE_BACKEND_RESOURCE_GROUP_FOO,
#                AZURE_BACKEND_CONTAINER_NAME
#   - GitHub Environment: create via Settings → Environments (or sync-environments workflow)

name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - "configurations/**"
      - ".github/workflows/deploy.yml"
  push:
    branches: [main]
    paths:
      - "configurations/**"

# ── Pin module repo version ──────────────────────────────────────────────────
# Update this when upgrading to a new module release.
env:
  MODULE_REPO_TAG: v1.0.2

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # DISCOVER — scan configurations/env-* to build a dynamic matrix
  # ════════════════════════════════════════════════════════════════════════════
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: configurations
      - name: Scan environments
        id: scan
        run: |
          matrix="[]"
          for dir in configurations/env-*/; do
            [ -f "${dir}config.yaml" ] || continue
            env_name="${dir#configurations/env-}"
            env_name="${env_name%/}"
            # Secret suffix: uppercase, hyphens → underscores
            suffix=$(echo "$env_name" | tr '[:lower:]-' '[:upper:]_')
            matrix=$(echo "$matrix" | jq -c \
              --arg e "$env_name" \
              --arg c "${dir}config.yaml" \
              --arg s "$suffix" \
              '. + [{"environment": $e, "config_file": $c, "secret_suffix": $s}]')
          done
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered environments: $matrix"

  # ════════════════════════════════════════════════════════════════════════════
  # PLAN — runs all environments in parallel on PR
  # ════════════════════════════════════════════════════════════════════════════
  plan:
    needs: discover
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: LaurentLesle/terraform-rest-galaxy/.github/workflows/deploy.yml@v1.0.2
    with:
      config_file: ${{ matrix.config_file }}
      action: plan
      environment: ${{ matrix.environment }}
      module_version: v1.0.2
      backend_storage_account: ${{ vars[format('AZURE_BACKEND_STORAGE_ACCOUNT_{0}', matrix.secret_suffix)] }}
      backend_resource_group: ${{ vars[format('AZURE_BACKEND_RESOURCE_GROUP_{0}', matrix.secret_suffix)] }}
      backend_container_name: ${{ vars.AZURE_BACKEND_CONTAINER_NAME }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets[format('AZURE_CLIENT_ID_{0}', matrix.secret_suffix)] }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets[format('AZURE_SUBSCRIPTION_ID_{0}', matrix.secret_suffix)] }}

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY — runs sequentially on merge to main
  # Ordering is enforced by max-parallel + GitHub Environment approval gates.
  # ════════════════════════════════════════════════════════════════════════════
  apply:
    needs: discover
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: LaurentLesle/terraform-rest-galaxy/.github/workflows/deploy.yml@v1.0.2
    with:
      config_file: ${{ matrix.config_file }}
      action: apply
      environment: ${{ matrix.environment }}
      module_version: v1.0.2
      backend_storage_account: ${{ vars[format('AZURE_BACKEND_STORAGE_ACCOUNT_{0}', matrix.secret_suffix)] }}
      backend_resource_group: ${{ vars[format('AZURE_BACKEND_RESOURCE_GROUP_{0}', matrix.secret_suffix)] }}
      backend_container_name: ${{ vars.AZURE_BACKEND_CONTAINER_NAME }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets[format('AZURE_CLIENT_ID_{0}', matrix.secret_suffix)] }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets[format('AZURE_SUBSCRIPTION_ID_{0}', matrix.secret_suffix)] }}
